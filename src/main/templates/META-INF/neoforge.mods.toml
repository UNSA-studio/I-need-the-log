modLoader="javafml"
loaderVersion="[21.1,)"

[[mods]]
modId="i_need_the_log"
version="1.0.0"
displayName="I need the log!"
logoFile="logo.png"
description='''
This mod allows you to easily export the full game log (from startup to the current moment) when encountering unknown errors or unexpected disconnections without a full crash. Convenient and fast for analysis!
'''

license="${mod_license}"

[[dependencies.i_need_the_log]]
    modId="neoforge"
    mandatory=true
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.i_need_the_log]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
